# Reference: https://github.com/nikitabobko/AeroSpace/blob/main/docs/config-examples/default-config.toml
start-at-login = true

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
cmd-enter = 'exec-and-forget open -n "/Applications/Nix Apps/Alacritty.app"'
cmd-b = 'exec-and-forget open -n "/Applications/Microsoft Edge.app"'
cmd-e = 'exec-and-forget open -a Finder'
cmd-h = 'focus --boundaries-action wrap-around-the-workspace left'
cmd-k = 'focus --boundaries-action wrap-around-the-workspace down'
cmd-j = 'focus --boundaries-action wrap-around-the-workspace up'
cmd-l = 'focus --boundaries-action wrap-around-the-workspace right'
cmd-shift-h = 'move left'
cmd-shift-k = 'move down'
cmd-shift-j = 'move up'
cmd-shift-l = 'move right'
cmd-f = 'fullscreen'
cmd-v = 'layout tiles horizontal vertical'
cmd-shift-space = 'layout floating tiling'

cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'
cmd-0 = 'workspace 10'
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
cmd-shift-0 = 'move-node-to-workspace 10'

# switch monitors
cmd-m = 'move-workspace-to-monitor --wrap-around next'
cmd-shift-r = 'reload-config'
cmd-r = 'mode resize'

[mode.resize.binding]
h = 'resize width +50'
j = 'resize height -50'
k = 'resize height +50'
l = 'resize width -50'
enter = 'mode main'
esc = 'mode main'

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = ['secondary', 'main']
6 = ['secondary', 'main']
7 = ['secondary', 'main']
8 = ['secondary', 'main']
9 = ['secondary', 'main']
